<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Senanayaka Cream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#D4AF37',
                        'dark': '#111111',
                    },
                    fontFamily: {
                        serif: ['Playfair Display', 'serif'],
                        sans: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-50 text-dark overflow-x-hidden selection:bg-gold selection:text-white">
    <!-- WebGL Background -->
    <canvas id="webgl-canvas" class="fixed top-0 left-0 w-full h-full -z-10 opacity-30"></canvas>

    <!-- Navigation -->
    <nav class="fixed w-full z-50 transition-all duration-500 bg-white/80 backdrop-blur-md border-b border-gray-100"
        id="navbar">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 group">
                <span
                    class="text-2xl font-serif font-bold tracking-wider text-dark group-hover:text-gold transition-colors">SENANAYAKA</span>
            </a>
            <div class="hidden md:flex space-x-8 text-sm font-medium tracking-widest uppercase items-center">
                <a href="index.html" class="nav-link">Home</a>
                <a href="about.html" class="nav-link">About</a>
                <a href="products.html" class="nav-link">Collection</a>
                <a href="contact.html" class="nav-link active">Contact</a>
                <a href="products.html"
                    class="px-6 py-2 border border-gold text-gold hover:bg-gold hover:text-white transition-all duration-300 rounded-full">Shop
                    Now</a>
            </div>
            <!-- Mobile Menu Button -->
            <button class="md:hidden text-2xl focus:outline-none" id="mobile-menu-btn">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
        </div>
    </nav>

    <!-- Header -->
    <header class="pt-40 pb-10 relative px-6 text-center">
        <h1 class="text-5xl md:text-7xl font-serif font-bold mb-6 reveal-up">Get in Touch</h1>
        <p class="text-gray-600 font-light max-w-2xl mx-auto text-lg reveal-up" style="transition-delay: 100ms;">We
            would love to hear from you. Reach out for any inquiries.</p>
    </header>

    <!-- Contact Form -->
    <section class="py-16 max-w-4xl mx-auto px-6 mb-20 reveal-up" style="transition-delay: 200ms;">
        <div class="bg-white rounded-3xl p-10 shadow-2xl">
            <form class="space-y-8">
                <div class="grid md:grid-cols-2 gap-8">
                    <div>
                        <label class="block text-sm font-medium tracking-widest uppercase text-gray-500 mb-2">First
                            Name</label>
                        <input type="text"
                            class="w-full border-b-2 border-gray-200 py-3 focus:outline-none focus:border-gold transition-colors bg-transparent text-lg font-light placeholder-gray-300"
                            placeholder="Jane">
                    </div>
                    <div>
                        <label class="block text-sm font-medium tracking-widest uppercase text-gray-500 mb-2">Last
                            Name</label>
                        <input type="text"
                            class="w-full border-b-2 border-gray-200 py-3 focus:outline-none focus:border-gold transition-colors bg-transparent text-lg font-light placeholder-gray-300"
                            placeholder="Doe">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium tracking-widest uppercase text-gray-500 mb-2">Email
                        Address</label>
                    <input type="email"
                        class="w-full border-b-2 border-gray-200 py-3 focus:outline-none focus:border-gold transition-colors bg-transparent text-lg font-light placeholder-gray-300"
                        placeholder="hello@example.com">
                </div>
                <div>
                    <label
                        class="block text-sm font-medium tracking-widest uppercase text-gray-500 mb-2">Message</label>
                    <textarea rows="4"
                        class="w-full border-b-2 border-gray-200 py-3 focus:outline-none focus:border-gold transition-colors bg-transparent text-lg font-light placeholder-gray-300 resize-none"
                        placeholder="How can we help you?"></textarea>
                </div>
                <button type="submit"
                    class="w-full py-4 bg-dark text-white rounded-full font-medium tracking-wider hover:bg-gold transition-colors text-lg mt-4 shadow-lg hover:shadow-gold/30">Send
                    Message</button>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-dark text-white pt-24 pb-10">
        <!-- Footer content same as others -->
        <div class="text-center text-gray-500 font-light text-sm">
            <p>&copy; 2026 Senanayaka Cream. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.32/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

    <script src="js/main.js"></script>
</body>

</html>
